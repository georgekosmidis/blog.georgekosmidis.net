name: Prepare Static App

on:
  push:
    branches: [ main ]
    paths: workables/**
  schedule:
    - cron: '0 3 * * *' # run at 03 AM UTC
  workflow_dispatch:
  
jobs:
  build-static-app:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      # Comma-separated list of GitHub usernames allowed to auto-merge and trigger deploy.
      # Defaults to repository owner; edit to include more (e.g. "alice,bob").
      AUTO_MERGE_ACTORS: '${{ github.repository_owner }}'

    steps:
    
    - name: checkout-code
      uses: actions/checkout@v4

    - name: setup-dotnet
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: build-builder
      run: dotnet build ./_src/Blog.Builder.sln --configuration Release

    - name: publish-builder
      run: dotnet publish ./_src/Blog.Builder/Blog.Builder.csproj --configuration Release --output tmp
    
    - name: build-output
      run: |
           cd tmp
           dotnet Blog.Builder.dll --workables ../workables --output ../_output

    - name: push-output
      id: push_output
      run: |
           cd _output
           branchbasename=build-$(date +"%Y.%m.%d-%H.%M.%S")-${{ github.run_number }}
           branchname=feature/${branchbasename}
           git config user.name blogbot
           git config user.email blogbot@github.com
           git pull
           git branch ${branchname}
           git push --set-upstream origin ${branchname} 
           git checkout ${branchname}
           git add .
           git commit --allow-empty -m "Automated static files build"
           git push
           echo "branchname=${branchname}" >> $GITHUB_OUTPUT

    - name: pull-request
      uses: actions/github-script@v7
      with:
        script: |
          title = '[User Added Content] User ${{ github.actor }} has added new content that is ready to be published.'
          if( '${{ github.event_name }}'  == 'schedule' ) {
             title = '[Nightly Build] Automated publishment triggered by a schedule.'
          }
          if( '${{ github.event_name }}'  == 'workflow_dispatch' ) {
             title = '[Manual Trigger] User ${{ github.actor }} triggered this workflow.'
          }
          const { repo, owner } = context.repo;
          const pr = await github.rest.pulls.create({
            title: title,
            owner,
            repo,
            head: '${{ steps.push_output.outputs.branchname }}',
            base: 'main',
            body: [
              'This PR is auto-generated by',
              '[actions/github-script](https://github.com/actions/github-script).'
            ].join('\n')
          });
          
          github.rest.issues.addLabels({
            owner,
            repo,
            issue_number: pr.data.number,
            labels: ['${{ github.event_name }}', 'automated-pr']
          });

          const actor = '${{ github.actor }}';
          const eventName = '${{ github.event_name }}';
          const allowedActors = ('${{ env.AUTO_MERGE_ACTORS }}' || '').split(',').map(s => s.trim()).filter(Boolean);
          if (eventName === 'schedule' || allowedActors.includes(actor)) {
             // Retry merge to handle "Base branch was modified" race condition
             const maxRetries = 5;
             for (let attempt = 1; attempt <= maxRetries; attempt++) {
               try {
                 await github.rest.pulls.merge({
                   owner,
                   repo,
                   pull_number: pr.data.number,
                 });
                 core.info(`PR merged successfully on attempt ${attempt}`);
                 break;
               } catch (error) {
                 if (attempt === maxRetries) throw error;
                 core.warning(`Merge attempt ${attempt} failed: ${error.message}. Retrying in ${attempt * 5}s...`);
                 await new Promise(r => setTimeout(r, attempt * 5000));
               }
             }
          }
    
     # Note: Events (pushes and pull requests) created by workflows using the
     # repository's GITHUB_TOKEN do NOT trigger new workflow runs. This prevents
     # workflow-created events from retriggering workflows and causing loops.
     # See: https://docs.github.com/en/actions/security-guides/automatic-token-authentication#using-the-github_token-in-a-workflow
     # That is why for scheduled runs although we directly merge the PR to trigger the push-static-app.yml workflow it will not. 
     # Wwe need to deploy it here
    - name: deploy
      uses: Azure/static-web-apps-deploy@v1
      if: ${{ github.event_name == 'schedule' || contains(env.AUTO_MERGE_ACTORS, github.actor) }}
      with:
        azure_static_web_apps_api_token: ${{ secrets.AZURE_DEPLOYMENT_TOKEN }}
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        action: "upload"
        app_location: "/_output"

